services:
  # --- Django Backend ---
  - type: web
    name: birs-backend
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn birs_django.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Match your local version
      - key: DJANGO_SETTINGS_MODULE
        value: birs_django.settings
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: birs-db
          property: connectionString

  # --- Next.js Frontend ---
  - type: web
    name: birs-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: birs-backend
          property: host

databases:
  - name: birs-db
    plan: free # Use the free tier